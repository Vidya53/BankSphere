# ═══════════════════════════════════════════════════════════════════════════════
# SHARED CONFIGURATION — applies to every service that connects to this
# config server. Service-specific files ({service-name}.yaml) override these
# values. Profile files (application-dev.yaml, application-prod.yaml) layer
# further overrides on top.
# ═══════════════════════════════════════════════════════════════════════════════

# ── Eureka ───────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
    enabled: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90

# ── Actuator ────────────────────────────────────────────────────────────────
# /actuator/refresh is required for runtime config refresh without restart.
# readiness/liveness groups support Kubernetes probes.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,refresh,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    readinessState:
      enabled: true
    livenessState:
      enabled: true

# ── Jackson ─────────────────────────────────────────────────────────────────
spring:
  jackson:
    default-property-inclusion: non_null

# ── Datasource (shared credentials + driver) ────────────────────────────────
# Every JPA-backed service uses the same MySQL instance — only the schema URL
# differs per service, so each service yaml just sets `spring.datasource.url`.
# Override DB_USERNAME / DB_PASSWORD via env vars in production. Services with
# no JDBC on the classpath (api-gateway, eureka-server) ignore these values.
  datasource:
    username:          ${DB_USERNAME:root}
    password:          ${DB_PASSWORD:Vidya@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate (shared) ────────────────────────────────────────────────
# ddl-auto = update is fine for dev; application-prod.yaml flips this to
# `validate` so prod schemas come from migrations. Override per environment
# with the JPA_DDL_AUTO env var.
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

# ── Kafka shared defaults ────────────────────────────────────────────────────
# Individual services override producer/consumer sections as needed.
# Services that only produce (account, loan, etc.) add producer config.
# audit-compliance-service adds consumer config in its own yaml.
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ── OpenFeign defaults ───────────────────────────────────────────────────────
feign:
  circuitbreaker:
    enabled: true
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 3000

# ── Resilience4j defaults ────────────────────────────────────────────────────
# Services override these defaults with named instances in their own config.
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        slowCallRateThreshold: 80
        slowCallDurationThreshold: 2s
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        recordExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  timelimiter:
    configs:
      default:
        timeoutDuration: 3s
        cancelRunningFuture: true
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException

# ── Logging ──────────────────────────────────────────────────────────────────
# %X{correlationId:-} and %X{userId:-} are MDC values injected by CorrelationIdFilter.
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] [%X{userId:-}] %-5level %logger{36} - %msg%n"
