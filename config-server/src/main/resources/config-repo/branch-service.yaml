server:
  port: ${BRANCH_SERVICE_PORT:8086}

spring:
  datasource:
    # Credentials + driver come from config-repo/application.yaml (shared).
    url: ${BRANCH_DB_URL:jdbc:mysql://localhost:3306/branch_service_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

springdoc:
  api-docs:
    path: /branch-service/api-docs
  swagger-ui:
    path: /branch-service/swagger-ui.html
