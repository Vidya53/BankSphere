# ═══════════════════════════════════════════════════════════════════════════════
# TRANSACTION SERVICE — DEV profile overrides
# ═══════════════════════════════════════════════════════════════════════════════

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

logging:
  level:
    com.cts.transactionservice: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
