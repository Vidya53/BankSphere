spring:
  application:
    name: api-gateway

  # ── Config Server import ──────────────────────────────────────────────────
  # Routes and Resilience4j circuit-breaker config live in the config-server.
  # Without config-server the gateway starts with no routes (safe but useless).
  # In production, set SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
  # to enforce fail-fast — a gateway with no routes must never silently start.
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
