spring:
  application:
    name: loan-service

  # ── Config Server import ──────────────────────────────────────────────────
  # 'optional:' lets the service start without config-server (dev convenience).
  # In production, set SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"

  cloud:
    config:
      fail-fast: false
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
